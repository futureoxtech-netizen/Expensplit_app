name: expense_app
description: Expense sharing & personal finance — premium Flutter client.
publish_to: "none"
version: 0.1.0+5

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0
  socket_io_client: ^2.0.3+1

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # UI / animations
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  fl_chart: ^0.68.0
  cached_network_image: ^3.4.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0

  # Auth
  google_sign_in: ^6.2.1

  # Push notifications
  onesignal_flutter: ^5.2.7

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  collection: ^1.18.0
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  url_launcher: ^6.3.0

  # Reports / export
  pdf: ^3.11.1
  printing: ^5.13.2
  universal_html: ^2.2.4

  # Splash screen
  flutter_native_splash: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    # `app_logo.png` lives at the project's `assets/` root (not under
    # `assets/images/`) because flutter_launcher_icons reads it from
    # there. It must be listed explicitly so `Image.asset('assets/
    # app_logo.png')` resolves at runtime — otherwise BrandLogo silently
    # falls through to the wallet errorBuilder icon.
    - assets/app_logo.png

flutter_launcher_icons:
  # `app_logo.png` is the launcher art with proper baked-in margin around
  # the glyph — use it everywhere, including as the adaptive foreground.
  # The tight transparent `logo.png` previously used as the adaptive
  # foreground caused the glyph to touch the icon edges on launchers that
  # apply a circle / squircle mask (Android's adaptive-icon safe zone is
  # only the central 66/108 ≈ 61% of the canvas, so any foreground that
  # fills the full canvas WILL get clipped). The baked-in margin on
  # `app_logo.png` keeps the glyph comfortably inside that safe zone.
  android: true
  ios: false
  image_path: "assets/app_logo.png"
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_logo.png"
  web:
    generate: true
    image_path: "assets/app_logo.png"
    background_color: "#FFFFFF"
    theme_color: "#6C5CE7"
  windows:
    generate: true
    image_path: "assets/app_logo.png"
    icon_size: 48

flutter_native_splash:
  # Matches AppColors.darkBg + the Dart SplashScreen background so the
  # native → Flutter handoff is invisible. Run
  #   `dart run flutter_native_splash:create`
  # after changing these values.
  color: "#0B0B12"
  color_dark: "#0B0B12"
  image: assets/images/logo.png
  image_dark: assets/images/logo.png
  android: true
  ios: false
  android_gravity: center
  fullscreen: false
