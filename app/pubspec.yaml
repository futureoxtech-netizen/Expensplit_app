name: expense_app
description: Expense sharing & personal finance — premium Flutter client.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0
  socket_io_client: ^2.0.3+1

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # UI / animations
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  fl_chart: ^0.68.0
  cached_network_image: ^3.4.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0

  # Auth
  google_sign_in: ^6.2.1

  # Push notifications
  onesignal_flutter: ^5.2.7

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  collection: ^1.18.0
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  share_plus: ^10.0.2

  # Reports / export
  pdf: ^3.11.1
  printing: ^5.13.2
  universal_html: ^2.2.4

  # Splash screen
  flutter_native_splash: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  # `app_logo.png` is the launcher art with a baked-in white background —
  # use it everywhere a solid icon is shown (legacy square Android icon,
  # web favicon, Windows .ico). The adaptive icon layer is the only place
  # we want the transparent `logo.png`, since its backdrop is rendered
  # separately via `adaptive_icon_background`.
  android: true
  ios: false
  image_path: "assets/app_logo.png"
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/app_logo.png"
    background_color: "#FFFFFF"
    theme_color: "#6C5CE7"
  windows:
    generate: true
    image_path: "assets/app_logo.png"
    icon_size: 48

flutter_native_splash:
  # Matches AppColors.darkBg + the Dart SplashScreen background so the
  # native → Flutter handoff is invisible. Run
  #   `dart run flutter_native_splash:create`
  # after changing these values.
  color: "#0B0B12"
  color_dark: "#0B0B12"
  image: assets/images/logo.png
  image_dark: assets/images/logo.png
  android: true
  ios: false
  android_gravity: center
  fullscreen: false
