<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Expense — premium expense sharing & personal finance">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Expense">
  <meta name="theme-color" content="#0B0B12">

  <link rel="manifest" href="manifest.json">

  <title>Expense</title>

  <style>
    html, body { margin:0; padding:0; height:100%; background:#0B0B12; }
    #loading {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; color:#E9E9F2;
      font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;
      transition: opacity 280ms ease-out;
      z-index: 9999;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .dot {
      width:14px; height:14px; border-radius:50%;
      background:linear-gradient(135deg,#6C5CE7,#00B894);
      animation:pulse 1.2s infinite ease-in-out;
    }
    @keyframes pulse { 0%,100%{transform:scale(.8);opacity:.6} 50%{transform:scale(1.2);opacity:1} }
  </style>
</head>
<body>
  <div id="loading"><div class="dot"></div></div>

  <script>
    // Remove the boot loader once Flutter paints its first frame.
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (!el) return;
      el.classList.add('hidden');
      setTimeout(function () { if (el && el.parentNode) el.parentNode.removeChild(el); }, 300);
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
