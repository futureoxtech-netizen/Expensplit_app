<!DOCTYPE html><html><head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Expensplit — split bills, track personal expenses, hit savings goals.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Expensplit">
  <meta name="theme-color" content="#0B0B12">
  <!-- Replace with your Google OAuth Web Client ID from console.cloud.google.com -->
  <meta name="google-signin-client_id" content="382556398073-8qkv4r3fdn3dqqil13mgme341r8uuskh.apps.googleusercontent.com">

  <link rel="manifest" href="manifest.json">

  <title>Expensplit</title>

  <style>
    html, body { margin:0; padding:0; height:100%; background:#0B0B12; }
    #loading {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; color:#E9E9F2;
      font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;
      transition: opacity 280ms ease-out;
      z-index: 9999;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .dot {
      width:14px; height:14px; border-radius:50%;
      background:linear-gradient(135deg,#6C5CE7,#00B894);
      animation:pulse 1.2s infinite ease-in-out;
    }
    @keyframes pulse { 0%,100%{transform:scale(.8);opacity:.6} 50%{transform:scale(1.2);opacity:1} }
  </style>
  
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #0B0B12;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #0B0B12;
          }
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
  
  <div id="loading"><div class="dot"></div></div>

  <script>
    // Remove the boot loader once Flutter paints its first frame.
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (!el) return;
      el.classList.add('hidden');
      setTimeout(function () { if (el && el.parentNode) el.parentNode.removeChild(el); }, 300);
    });
  </script>

  <script src="flutter_bootstrap.js" async=""></script>


</body></html>
