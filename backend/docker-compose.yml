services:
  mongo:
    image: mongo:7
    container_name: expense-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: expense-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: expense-api
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    env_file:
      - .env
    ports:
      - "4000:4000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  mongo_data:
